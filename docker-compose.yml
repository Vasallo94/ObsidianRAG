services:
  backend:
    image: ghcr.io/vasallo94/obsidianrag-backend:latest
    # build: ./backend  # uncomment to build locally instead of pulling
    ports:
      - "8000:8000"
    volumes:
      - ${OBSIDIAN_VAULT_PATH:?Set OBSIDIAN_VAULT_PATH to your vault}:/vault
      - hf-cache:/home/appuser/.cache/huggingface
    environment:
      - OBSIDIANRAG_OBSIDIAN_PATH=/vault
      - OBSIDIANRAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OBSIDIANRAG_LLM_MODEL=${LLM_MODEL:-gemma3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 4g
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  hf-cache:
